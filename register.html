<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Screen</title>
    <link rel="stylesheet" href="/styles/index.css">
</head>
<body>
    <h1>Register new User</h1>
    <div id="error-message" style="color:red;"></div>
    <form id="register-form" action="/add-user" method="POST">
        <label for="username">Username:</label>
        <input type="text" name="username" id="username">
        <label for="pass">Password:</label>
        <input type="password" name="pass" id="pass">
        <label for="confirm-pass">Confirm Password:</label>
        <input type="password" name="confirmPass" id="confirm-pass">
        <button type="submit">Create Account</button>
    </form>
    <a href="/">Existing user? Click here to login</a>

</body>

<script>
  const params = new URLSearchParams(window.location.search);
  const error = params.get("error");
  if (error) {
    document.getElementById("error-message").textContent = decodeURIComponent(error);
  }
</script>

</html>
